name: "Keepalive: Text Generator"

on:
  schedule:
    # Twice daily — 10:00 and 22:00 UTC (staggered from health check)
    - cron: '0 10,22 * * *'
  workflow_dispatch: {}

jobs:
  keepalive-text:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Random delay (0-8 min)
        run: |
          DELAY=$((RANDOM % 480))
          echo "Sleeping ${DELAY}s (~$((DELAY/60))min) for random spacing"
          sleep $DELAY

      - name: "Generate text and write to Supabase"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GROQ_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, os, time, urllib.request, urllib.error

          SB_URL = os.environ["SUPABASE_URL"]
          SB_KEY = os.environ["SUPABASE_KEY"]
          GROQ_KEY = os.environ["GROQ_KEY"]
          HEADERS = {
              "Content-Type": "application/json",
              "apikey": SB_KEY,
              "Authorization": f"Bearer {SB_KEY}",
              "Prefer": "return=minimal",
          }

          # --- Generate text via Groq ---
          text = "keepalive-text-fallback"
          try:
              groq_body = json.dumps({
                  "model": "llama-3.3-70b-versatile",
                  "messages": [{"role": "user", "content": "Write one interesting AI fact or tip in Hebrew, max 2 sentences. No markdown."}],
                  "max_tokens": 150,
                  "temperature": 1.0,
              }).encode()
              req = urllib.request.Request("https://api.groq.com/openai/v1/chat/completions",
                  data=groq_body, headers={"Content-Type": "application/json", "Authorization": f"Bearer {GROQ_KEY}"})
              with urllib.request.urlopen(req, timeout=15) as res:
                  data = json.loads(res.read())
                  text = data["choices"][0]["message"]["content"][:200]
              print(f"Groq OK: {text[:60]}...")
          except Exception as e:
              print(f"Groq failed ({e}), using fallback")

          # --- Write 1: text event ---
          body = json.dumps({"event_type": "keepalive_text", "event_target": text, "page_path": f"/keepalive/text/{int(time.time())}"}).encode()
          req = urllib.request.Request(f"{SB_URL}/rest/v1/analytics_events", data=body, headers=HEADERS, method="POST")
          with urllib.request.urlopen(req, timeout=10) as res:
              print(f"Write 1: {res.status}")

          # --- Write 2: meta event ---
          meta = f"github-actions|groq|{time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())}"
          body = json.dumps({"event_type": "keepalive_text_meta", "event_target": meta, "page_path": "/keepalive/text/meta"}).encode()
          req = urllib.request.Request(f"{SB_URL}/rest/v1/analytics_events", data=body, headers=HEADERS, method="POST")
          with urllib.request.urlopen(req, timeout=10) as res:
              print(f"Write 2: {res.status}")

          # --- Search: query links ---
          req = urllib.request.Request(f"{SB_URL}/rest/v1/links?select=id,title&is_visible=eq.true&limit=10",
              headers={"apikey": SB_KEY, "Authorization": f"Bearer {SB_KEY}"})
          with urllib.request.urlopen(req, timeout=10) as res:
              links = json.loads(res.read())
              print(f"Search: {len(links)} links found")

          print("All done!")
          PYEOF
